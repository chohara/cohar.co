<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Space: Extraction (Wii)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="review-container">
    <!-- Title Box -->
    <div class="title-box">
        <a href="/games/" class="home-button">[ ◀ HOME ]</a>
        <h1>Dead Space: Extraction</h1>
    </div>

    <!-- Cover Art Box -->
    <div class="cover-box">
        <img src="/images/game_covers/dead_space_extraction.jpg" alt="Cover Art">
    </div>

    <!-- Review Content Box -->
    <div class="review-box">
        <p><br><br>
        Play it for the:
        </p>
        <ul>
            <li>Dead Space lore</li>
            <li>Rock solid light-gun gameplay</li>
            <li>Industrial sci-fi scares</li>
        </ul>
        <p style="text-align: right">Reviewed on 2026-04-12</p>
        <br>
        <p style="text-align: center"><i>Slicing the limbs off of necromorphs is just as satisfying with a Wii remote.</i></p>
        <img src="/images/game_screenshots/dead_space_extraction.jpg">
    </div>

    <!-- Star Rating Box -->
    <div class="rating-box">
        <span class="stars">★★★⯪☆</span> <!-- ☆⯪★ Adjust stars as needed for rating -->
        <p>3.5 out of 5</p>
